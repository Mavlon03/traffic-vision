server.port=${SERVER_PORT:8080}

# Datasource
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driverClassName=org.postgresql.Driver

# Python API
python.api.url=${PYTHON_API_URL}

# CORS / WebSocket
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
websocket.allowed-origin-patterns=${WEBSOCKET_ALLOWED_ORIGIN_PATTERNS:${CORS_ALLOWED_ORIGINS}}

# Swagger
app.swagger.description=Yo'l belgisi aniqlash tizimi API (production)
app.swagger.server-url=${APP_SWAGGER_SERVER_URL}
app.swagger.server-description=${APP_SWAGGER_SERVER_DESCRIPTION:Production server}

# Logging
spring.jpa.show-sql=false
logging.level.uz.pdp.trafficvision=INFO
logging.level.org.hibernate.SQL=WARN

# Devtools
spring.devtools.restart.enabled=false
