spring.application.name=traffic-vision
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
spring.cloud.config.enabled=false

# Shared JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Shared upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Shared JWT
jwt.secret=${JWT_SECRET:dHJhZmZpYy12aXNpb24tc3VwZXItc2VjcmV0LWp3dC1rZXktZm9yLWhzMjU2}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Shared storage
file.upload.dir=${FILE_UPLOAD_DIR:./uploads}

# Shared Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
app.swagger.title=Traffic Vision API
app.swagger.version=1.0.0
